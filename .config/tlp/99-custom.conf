# CPU - amd-pstate-epp uses powersave governor + EPP for control
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave
CPU_ENERGY_PERF_POLICY_ON_AC=performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0
CPU_HWP_DYN_BOOST_ON_AC=1
CPU_HWP_DYN_BOOST_ON_BAT=0

# Platform profile (firmware-level power hint)
PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# WiFi power saving
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# USB autosuspend (2 second timeout)
USB_AUTOSUSPEND=1
USB_AUTOSUSPEND_DISABLE_ON_SHUTDOWN=1

# Disks - NVMe + HDD (sda)
DISK_DEVICES="nvme0n1 sda"
DISK_APM_LEVEL_ON_AC="254 192"
DISK_APM_LEVEL_ON_BAT="128 128"
DISK_SPINDOWN_TIMEOUT_ON_AC="0 0"
DISK_SPINDOWN_TIMEOUT_ON_BAT="0 60"
DISK_IOSCHED="none mq-deadline"

# NVMe power saving
DISK_IDLE_SECS_ON_AC=0
DISK_IDLE_SECS_ON_BAT=2

# PCI runtime power management
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto

# Audio power saving
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER=Y

# Kernel writeback (reduces disk wakeups on battery)
DIRTY_WRITEBACK_SECS_ON_AC=15
DIRTY_WRITEBACK_SECS_ON_BAT=60
